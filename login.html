<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login to the Organised Learning Platform for Cavendish University Students" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=local_library"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Login — Organised Learning Platform</title>
  </head>
  <body class="login-page">
    <nav>
      <div class="container">
        <a href="/" class="logo">
          <span class="material-symbols-outlined">local_library</span>
          Organised Learning Platform
        </a>
        <input type="checkbox" id="menu-toggle" />
        <div class="mobile-menu">
          <label for="menu-toggle" class="menu">
            <span></span>
          </label>
        </div>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/lectures.html">Lectures</a></li>
          <li><a href="/results.html">Results</a></li>
          <li><a href="/communication.html">Communication</a></li>
          <li class="nav-buttons">
            <a class="primary-button" href="/login.html">Login</a>
            <a class="primary-button" href="/register.html">Register</a>
          </li>
        </ul>
      </div>
    </nav>

    <section class="login-section">
      <div class="login-card">
        <div class="login-card-top-border"></div>

        <div class="login-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            <circle cx="12" cy="16" r="1" fill="#fff" stroke="none"></circle>
          </svg>
        </div>

        <h1 class="login-title">Login</h1>
        <p class="login-subtitle">Welcome back! Enter your credentials.</p>

        <div class="login-form">
          <div class="login-field">
            <label class="login-label" for="email">Email</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <input
                class="login-input"
                type="email"
                id="email"
                name="email"
                placeholder="you@students.cavendish.ac.ug"
                autocomplete="email"
              />
            </div>
          </div>

          <div class="login-field">
            <label class="login-label" for="password">Password</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input
                class="login-input"
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
            </div>
          </div>

          <div class="login-row">
            <label class="login-remember">
              <input type="checkbox" id="remember" name="remember" />
              <span class="login-checkbox-custom"></span>
              Remember me
            </label>
            <a href="/forgot-password.html" class="login-forgot">Forgot password?</a>
          </div>

          <button class="primary-button login-submit" type="button">
            Login
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
          </div>
          <div class="login-divider">
            <span>or</span>
          </div>

          <a href="/register.html" class="login-create-account">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <line x1="19" y1="8" x2="19" y2="14"></line>
              <line x1="22" y1="11" x2="16" y2="11"></line>
            </svg>
            Create a new account
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
