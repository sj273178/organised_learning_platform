<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Register for the Organised Learning Platform — Cavendish University"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Register — Organised Learning Platform</title>
  </head>
  <body class="login-page register-page">
    <nav>
      <div class="container">
        <a href="/" class="logo">
          <span class="material-symbols-outlined">local_library</span>
          Organised Learning Platform
        </a>
        <input type="checkbox" id="menu-toggle" />
        <div class="mobile-menu">
          <label for="menu-toggle" class="menu">
            <span></span>
          </label>
        </div>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/lectures.html">Lectures</a></li>
          <li><a href="/results.html">Results</a></li>
          <li><a href="/communication.html">Communication</a></li>
          <li class="nav-buttons">
            <a class="primary-button" href="/login.html">Login</a>
            <a class="primary-button" href="/register.html">Register</a>
          </li>
        </ul>
      </div>
    </nav>

    <section class="login-section page-background">
      <div class="login-card">
        <div class="login-card-top-border"></div>

        <div class="login-icon-wrap">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <line x1="19" y1="8" x2="19" y2="14"></line>
            <line x1="22" y1="11" x2="16" y2="11"></line>
          </svg>
        </div>

        <h1 class="login-title">Create Account</h1>
        <p class="login-subtitle">
          Join the Organised Learning Platform today.
        </p>

        <div class="login-form">
          <div class="login-field-row">
            <div class="login-field">
              <label class="login-label" for="fullname">Full Name</label>
              <div class="login-input-wrap">
                <svg
                  class="login-input-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input
                  class="login-input"
                  type="text"
                  id="fullname"
                  name="fullname"
                  placeholder="e.g. Jeslor Ssozi"
                  autocomplete="name"
                />
              </div>
            </div>
            <div class="login-field">
              <label class="login-label" for="student-id">Student ID</label>
              <div class="login-input-wrap">
                <svg
                  class="login-input-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                  <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <input
                  class="login-input"
                  type="text"
                  id="student-id"
                  name="student-id"
                  placeholder="e.g. CUU-273178"
                />
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="login-field">
            <label class="login-label" for="reg-email">Email</label>
            <div class="login-input-wrap">
              <svg
                class="login-input-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <input
                class="login-input"
                type="email"
                id="reg-email"
                name="email"
                placeholder="you@students.cavendish.ac.ug"
                autocomplete="email"
              />
            </div>
          </div>

          <!-- Password & Confirm Password row -->
          <div class="login-field-row">
            <!-- Password -->
            <div class="login-field">
              <label class="login-label" for="reg-password">Password</label>
              <div class="login-input-wrap">
                <svg
                  class="login-input-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  class="login-input"
                  type="password"
                  id="reg-password"
                  name="password"
                  placeholder="Create a password"
                  autocomplete="new-password"
                />
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="login-field">
              <label class="login-label" for="confirm-password">
                Confirm Password
              </label>
              <div class="login-input-wrap">
                <svg
                  class="login-input-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  class="login-input"
                  type="password"
                  id="confirm-password"
                  name="confirm-password"
                  placeholder="Re-enter your password"
                  autocomplete="new-password"
                />
              </div>
            </div>
          </div>

          <!-- Terms -->
          <div class="login-row" style="justify-content: flex-start">
            <label class="login-remember">
              <input type="checkbox" id="terms" name="terms" />
              <span class="login-checkbox-custom"></span>
              I agree to the
              <a href="#" style="color: var(--primary-color); font-weight: 600">
                Terms of Service
              </a>
            </label>
          </div>

          <button class="primary-button login-submit" type="button">
            Create Account
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>

          <div class="login-divider">
            <span>or</span>
          </div>

          <a href="/login.html" class="outline-button login-create-account">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Already have an account? Login
          </a>
        </div>
      </div>
    </section>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
